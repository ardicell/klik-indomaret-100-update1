name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip gradle-8.5-bin.zip
        echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

    - name: Install SDK packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"

    - name: Build 100 APK
      run: |

        mkdir outputs

        for i in {1..100}
        do

        rm -rf app

        mkdir -p app/src/main/java/com/wrapper/app$i
        mkdir -p app/src/main/res/values

        echo "rootProject.name='wrapper$i'" > settings.gradle
        echo "include ':app'" >> settings.gradle

        cat > build.gradle << EOF
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat > app/build.gradle << EOF
        plugins { id 'com.android.application' }

        android {
            namespace 'com.wrapper.app$i'
            compileSdk 34

            defaultConfig {
                applicationId "com.wrapper.app$i"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        cat > app/src/main/AndroidManifest.xml << EOF
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.wrapper.app$i">

            <application android:label="$i">

                <activity
                    android:name=".MainActivity"
                    android:exported="true">

                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>

                </activity>

            </application>

        </manifest>
        EOF

        cat > app/src/main/java/com/wrapper/app$i/MainActivity.java << EOF
        package com.wrapper.app$i;

        import android.app.Activity;
        import android.content.Intent;
        import android.os.Bundle;

        public class MainActivity extends Activity {

            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);

                try {

                    Intent intent = new Intent();
                    intent.setClassName(
                        "com.indomaret.klikindomaret",
                        "com.indomaret.klikindomaret.npllFchtmwmlu"
                    );

                    startActivity(intent);

                } catch (Exception e) {}

                finish();
            }
        }
        EOF

        gradle assembleDebug

        cp app/build/outputs/apk/debug/app-debug.apk outputs/$i.apk

        done

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: klik-indomaret-100
        path: outputs
